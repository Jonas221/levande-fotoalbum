<!DOCTYPE html>
<html>
<body style="font-size:20px; padding:20px;">
<h1>Rösttest</h1>
<button onclick="listVoices()" style="font-size:20px; padding:16px; margin:8px;">Visa röster</button>
<button onclick="testMic()" style="font-size:20px; padding:16px; margin:8px;">Testa mikrofon</button>
<div id="out" style="margin-top:20px; line-height:1.8;"></div>
<script>
function log(msg) {
  document.getElementById("out").innerHTML += msg + "<br>";
}

function listVoices() {
  document.getElementById("out").innerHTML = "";
  const voices = speechSynthesis.getVoices();
  log("Antal röster: " + voices.length);
  voices.filter(v => v.lang.startsWith("sv")).forEach(v => log("SV: " + v.name + " / " + v.lang));
  log("SpeechRecognition: " + !!(window.SpeechRecognition || window.webkitSpeechRecognition));
}

function testMic() {
  document.getElementById("out").innerHTML = "";
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { log("STÖDS INTE av denna webbläsare"); return; }
  log("Startar lyssnande...");
  const r = new SR();
  r.lang = "sv-SE";
  r.interimResults = false;
  r.onstart = () => log("✓ Lyssnar nu — säg något!");
  r.onresult = (e) => log("✓ Hörde: " + e.results[0][0].transcript);
  r.onerror = (e) => log("✗ Fel: " + e.error);
  r.onend = () => log("Slut.");
  r.start();
}
</script>
</body>
</html>
